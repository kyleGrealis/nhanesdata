name: Deploy Slides to Pi

on:
  # push:
  #   branches: [slides]
  workflow_dispatch:
    

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          # Add all dependencies for rendering slide content:
          Rscript -e 'install.packages(c("tidyverse", "nhanesdata"))'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render slides
        run: quarto render inst/slides

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via rsync over Cloudflare Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PI_SSH_KEY }}
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USERNAME }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '#!/bin/sh\nexec cloudflared access ssh --hostname "$1" --service-token-id "%s" --service-token-secret "%s"\n' "$CF_ID" "$CF_SECRET" > /tmp/cf-proxy.sh
          chmod +x /tmp/cf-proxy.sh
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ProxyCommand='/tmp/cf-proxy.sh %h'" \
            inst/slides/index.html \
            $PI_USER@$PI_HOST:/srv/slides/nhanesdata/

name: Update Team Data

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Minimize permissions (principle of least privilege)
permissions:
  contents: write  # Needed to commit updated checksums
  actions: read

jobs:
  update-team-data:
    name: Pull Team Data & Upload to R2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper git operations

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::remotes
            any::jsonlite
            any::yaml
            any::paws.storage
            any::digest
            any::forcats
            any::dplyr
            any::stringr
            any::janitor
          cache-version: 2

      - name: install nhanesdata package
        run: |
          remotes::install_local(".", dependencies = TRUE, force = TRUE)
        shell: Rscript {0}

      - name: Update team data
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          source("./inst/scripts/derived/create_base.R")
          source("./inst/scripts/derived/create_base_expanded.R")
        shell: Rscript {0}
